spring.datasource.url=${NEON_JDBC_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${NEON_DB_USERNAME}
spring.datasource.password=${NEON_DB_PASSWORD}

# Neon/PostgreSQL can retain prepared plans on pooled connections after a column
# type changes. Disable server-side prepared statement caching so schema updates
# do not leave Hikari connections with an incompatible cached result shape.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kuala_Lumpur
spring.sql.init.mode=never
