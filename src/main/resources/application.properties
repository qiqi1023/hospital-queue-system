spring.application.name=hospital-queue-system
server.port=8081
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Default local/demo database. Use the "neon" profile to connect to Neon.
spring.datasource.url=jdbc:h2:mem:hospital_queue_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jackson.deserialization.fail-on-unknown-properties=true
server.error.include-stacktrace=never
server.error.include-message=never
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:8081}
app.jwt.secret=${JWT_SECRET:local-development-jwt-secret-change-before-deployment-2026}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
